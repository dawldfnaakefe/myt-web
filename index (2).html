<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无畏契约 · 红包领取页</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 页面背景 */
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(120deg, #ff4757, #ff6b6b);
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        /* 标题样式 */
        h1 {
            margin: 30px 0;
            font-size: 36px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        /* 红包卡片 */
        .card {
            max-width: 400px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        /* 按钮样式 */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #ff4757;
            color: #fff;
            font-size: 18px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none; /* 新增：去除默认边框 */
            cursor: pointer; /* 新增：鼠标悬浮显示手型 */
        }
        .btn:hover {
            background: #e04050;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>无畏契约 · 春节红包大放送</h1>
    <div class="card">
        <p style="color: #333; margin-bottom: 20px;">
            点击下方按钮，即可领取专属红包奖励！<br><br>
            数量有限，先到先得！
        </p>
        <!-- 跳转链接（你可以改成自己的） -->
        <a href="https://www.bilibili.com/video/BV1GJ411x7h7/?spm_id_from=333.337.search-card.all.click&vd_source=6f47b1cf5cae7efb855324549230b6e0" class="btn">立即领取红包</a>
    </div>
</body>
</html>
